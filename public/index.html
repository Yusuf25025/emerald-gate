<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Gate | Sync Watch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --emerald: #50C878;
            --emerald-dark: #2E8B57;
            --emerald-glow: rgba(80, 200, 120, 0.6);
            --bg-dark: #0a0f0a;
            --text: #e0f0e5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player { width: 100%; height: 100%; border: none; }
        .local-video { max-width: 100%; max-height: 100%; }
        .controls {
            padding: 15px;
            background: rgba(10, 15, 10, 0.95);
            border-top: 1px solid var(--emerald-dark);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: rgba(80, 200, 120, 0.1);
            border: 1px solid var(--emerald-dark);
            color: var(--text);
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: var(--emerald-dark);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: var(--emerald); box-shadow: 0 0 15px var(--emerald-glow); }
        .chat-section {
            width: 300px;
            background: rgba(5, 10, 5, 0.98);
            border-left: 1px solid var(--emerald-dark);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 15px;
            background: linear-gradient(90deg, var(--emerald-dark), transparent);
            font-weight: bold;
            color: var(--emerald);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 8px 12px;
            background: rgba(80, 200, 120, 0.1);
            border-radius: 10px;
            border-left: 3px solid var(--emerald);
            font-size: 0.9em;
        }
        .message-sender { font-size: 0.7em; color: var(--emerald); opacity: 0.8; margin-bottom: 3px; }
        .chat-input {
            padding: 15px;
            border-top: 1px solid var(--emerald-dark);
            display: flex;
            gap: 10px;
        }
        .chat-input input { flex: 1; }
        .emerald-gate-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
        }
        .emerald-gate {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--emerald), var(--emerald-dark));
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
            box-shadow: 0 0 30px var(--emerald-glow), inset 0 0 20px rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
            transition: all 0.3s;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px var(--emerald-glow); }
        }
        .emerald-gate:hover {
            transform: scale(1.2);
            box-shadow: 0 0 60px var(--emerald-glow), 0 0 100px var(--emerald-glow);
        }
        .emerald-gate:active { transform: scale(0.95); }
        .sleep-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a1f0a 0%, #051005 50%, #0a0f0a 100%);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .sleep-overlay.active { display: flex; opacity: 1; }
        .sleep-content {
            margin: auto;
            text-align: center;
            padding: 40px;
        }
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--emerald), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(80,200,120,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, var(--emerald), transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(80,200,120,0.6), transparent),
                radial-gradient(1px 1px at 230px 80px, var(--emerald), transparent);
            background-repeat: repeat;
            background-size: 250px 250px;
            animation: twinkle 5s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .goodnight-message {
            position: relative;
            z-index: 10;
            font-size: 1.3em;
            color: rgba(224, 240, 229, 0.8);
            font-style: italic;
            text-shadow: 0 0 20px var(--emerald-glow);
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 1px solid rgba(80,200,120,0.3);
            backdrop-filter: blur(10px);
            max-width: 500px;
            line-height: 1.6;
        }
        .goodnight-message .signature {
            display: block;
            margin-top: 20px;
            color: var(--emerald);
            font-weight: bold;
        }
        .room-input {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        .room-input h1 { color: var(--emerald); text-shadow: 0 0 20px var(--emerald-glow); }
        .room-input input { width: 300px; text-align: center; font-size: 1.2em; }
        .hidden { display: none !important; }
        .source-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .source-toggle button {
            flex: 1;
            background: transparent;
            border: 1px solid var(--emerald-dark);
        }
        .source-toggle button.active {
            background: var(--emerald-dark);
        }
    </style>
</head>
<body>
    <div class="room-input" id="roomInput">
        <h1>🌿 Emerald Gate</h1>
        <p>Enter a room name to begin your journey</p>
        <input type="text" id="roomName" placeholder="Room name..." maxlength="20">
        <button onclick="joinRoom()">Enter</button>
    </div>

    <div class="container hidden" id="mainApp">
        <div class="video-section">
            <div class="video-container" id="videoContainer">
                <div id="player"></div>
                <video id="localPlayer" class="local-video hidden" controls></video>
            </div>
            
            <div class="controls">
                <div class="source-toggle">
                    <button class="active" onclick="setSource('youtube')">YouTube</button>
                    <button onclick="setSource('local')">Local File</button>
                </div>
                <input type="text" id="videoInput" placeholder="Paste YouTube URL or click Local File...">
                <input type="file" id="fileInput" accept="video/*" class="hidden" onchange="loadLocalFile(event)">
                <button onclick="loadVideo()">Load</button>
            </div>
        </div>
        
        <div class="chat-section">
            <div class="chat-header">🌙 Whisper Chat</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <div class="emerald-gate-container" id="emeraldGate">
        <div class="emerald-gate" onclick="pressEmeraldGate()" title="I'm still here"></div>
    </div>
    
    <div class="sleep-overlay" id="sleepOverlay">
        <div class="stars"></div>
        <div class="sleep-content">
            <div class="goodnight-message">
                "I hope you have the most beautiful dreams. I'll be here when you wake up."
                <span class="signature">- Y</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
