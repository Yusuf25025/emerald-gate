<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emerald Gate | Sync Watch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --emerald: #50C878;
            --emerald-dark: #2E8B57;
            --emerald-glow: rgba(80, 200, 120, 0.6);
            --bg-dark: #0a0f0a;
            --text: #e0f0e5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* LOGIN SCREEN */
        .room-input {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0a1f0a 0%, var(--bg-dark) 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }
        .room-input h1 { 
            color: var(--emerald); 
            font-size: 2.2em;
            text-shadow: 0 0 30px var(--emerald-glow);
            margin-bottom: 10px;
        }
        .room-input p { opacity: 0.7; font-size: 1.1em; }
        .room-input input { 
            width: 100%; 
            max-width: 300px;
            padding: 15px;
            background: rgba(80, 200, 120, 0.1);
            border: 2px solid var(--emerald-dark);
            color: var(--text);
            border-radius: 12px;
            font-size: 1.2em;
            text-align: center;
            outline: none;
        }
        .room-input input:focus { border-color: var(--emerald); box-shadow: 0 0 20px var(--emerald-glow); }
        .room-input button {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--emerald-glow);
        }

        /* MAIN APP - VERTICAL LAYOUT */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }
        #player { width: 100%; height: 100%; border: none; }
        .local-video { max-width: 100%; max-height: 100%; }

        /* DIM OVERLAY - gets darker over time */
        .dim-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            z-index: 50;
            pointer-events: none;
            transition: background 1s ease;
        }

        /* CONTROLS */
        .controls {
            padding: 12px;
            background: rgba(10, 15, 10, 0.98);
            border-top: 1px solid var(--emerald-dark);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 60;
        }
        .source-toggle {
            display: flex;
            gap: 8px;
        }
        .source-toggle button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1.5px solid var(--emerald-dark);
            color: var(--text);
            border-radius: 10px;
            font-size: 0.9em;
        }
        .source-toggle button.active {
            background: var(--emerald-dark);
            border-color: var(--emerald);
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 12px;
            background: rgba(80, 200, 120, 0.1);
            border: 1.5px solid var(--emerald-dark);
            color: var(--text);
            border-radius: 10px;
            font-size: 0.95em;
        }
        .input-row button {
            padding: 12px 20px;
            background: var(--emerald-dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        /* CHAT */
        .chat-section {
            height: 35vh;
            background: rgba(5, 10, 5, 0.98);
            border-top: 1px solid var(--emerald-dark);
            display: flex;
            flex-direction: column;
            z-index: 60;
        }
        .chat-header {
            padding: 10px 15px;
            background: linear-gradient(90deg, var(--emerald-dark), transparent);
            font-weight: bold;
            color: var(--emerald);
            font-size: 0.95em;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            padding: 8px 12px;
            background: rgba(80, 200, 120, 0.1);
            border-radius: 12px;
            border-left: 3px solid var(--emerald);
            font-size: 0.9em;
            max-width: 85%;
        }
        .message-sender { font-size: 0.7em; color: var(--emerald); opacity: 0.8; margin-bottom: 2px; }
        .chat-input {
            padding: 10px;
            border-top: 1px solid var(--emerald-dark);
            display: flex;
            gap: 8px;
        }
        .chat-input input { 
            flex: 1; 
            padding: 10px;
            background: rgba(80, 200, 120, 0.1);
            border: 1.5px solid var(--emerald-dark);
            color: var(--text);
            border-radius: 10px;
        }
        .chat-input button {
            padding: 10px 16px;
            background: var(--emerald-dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        /* EMERALD GATE - TOP RIGHT */
        .emerald-gate-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            display: none;
        }
        .emerald-gate {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--emerald), var(--emerald-dark));
            border: 2px solid rgba(255,255,255,0.4);
            cursor: pointer;
            box-shadow: 0 0 25px var(--emerald-glow), inset 0 0 15px rgba(255,255,255,0.3);
            animation: pulse 2s infinite;
            opacity: 0.9;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px var(--emerald-glow); }
        }

        /* SLEEP STATUS INDICATOR */
        .sleep-status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--emerald-dark);
            font-size: 0.8em;
            color: var(--emerald);
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        .sleep-status.visible { opacity: 1; }

        /* SLEEP MODE */
        .sleep-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a1f0a 0%, #051005 50%, #0a0f0a 100%);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .sleep-overlay.active { display: flex; opacity: 1; }
        .sleep-content { margin: auto; text-align: center; padding: 30px; }
        .stars {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--emerald), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(80,200,120,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, var(--emerald), transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        .goodnight-message {
            position: relative;
            z-index: 10;
            font-size: 1.2em;
            color: rgba(224, 240, 229, 0.85);
            font-style: italic;
            text-shadow: 0 0 20px var(--emerald-glow);
            padding: 25px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            border: 1px solid rgba(80,200,120,0.3);
            backdrop-filter: blur(10px);
            line-height: 1.6;
        }
        .goodnight-message .signature {
            display: block;
            margin-top: 15px;
            color: var(--emerald);
            font-weight: bold;
            font-size: 1.1em;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="room-input" id="roomInput">
        <h1>🌿 Emerald Gate</h1>
        <p>Enter a room name to begin</p>
        <input type="text" id="roomName" placeholder<response clipped><NOTE>Result is longer than **10000 characters**, will be **truncated**.</NOTE>
